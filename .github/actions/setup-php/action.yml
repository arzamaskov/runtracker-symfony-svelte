name: Setup PHP Environment
description: Setup PHP with extensions, Composer cache and dependencies

inputs:
  php-version:
    description: PHP version to use
    required: false
    default: '8.4'
  extensions:
    description: PHP extensions to install
    required: false
    default: pdo, pdo_pgsql, zip, opcache
  coverage:
    description: Coverage driver (none, xdebug, pcov)
    required: false
    default: none
  working-directory:
    description: Working directory for Composer
    required: false
    default: backend
  composer-options:
    description: Additional Composer install options
    required: false
    default: --no-interaction --no-progress --prefer-dist

runs:
  using: composite
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: ${{ inputs.extensions }}
        coverage: ${{ inputs.coverage }}
        ini-values: memory_limit=-1

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles(format('{0}/composer.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Create default .env if missing
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ ! -f .env ]; then
          echo "APP_ENV=test" > .env
          echo "APP_SECRET=ci_secret" >> .env
          echo "DEFAULT_URI=http://localhost" >> .env
          echo "DATABASE_URL=${DATABASE_URL:-postgresql://app:app_password@localhost:5432/runtracker_test?serverVersion=16&charset=utf8}" >> .env
        fi

    - name: Install Composer dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: composer install ${{ inputs.composer-options }}
